<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Compare HTML Tool</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <h1>SEO Compare HTML Tool</h1>
  <p class="description">
    So sánh nội dung chính của một URL bài viết với file HTML bạn tải lên.
  </p>

  <div class="card">
    <form id="compareForm">
      <label for="url">URL bài viết</label>
      <input
        type="url"
        id="url"
        name="url"
        placeholder="https://example.com/bai-viet"
        required
      />
      <div class="helper">
        Nhập đúng URL bài viết gốc cần đối chiếu.
      </div>

      <label for="htmlFile">File HTML</label>
      <input
        type="file"
        id="htmlFile"
        name="htmlFile"
        accept=".html,.htm"
        required
      />
      <div class="helper">
        Chỉ hỗ trợ file .html hoặc .htm.
      </div>

      <button type="submit" id="submitBtn">So sánh ngay</button>
    </form>

    <div id="statusArea"></div>
  </div>

  <div id="resultArea" class="result-wrap"></div>

  <script>
    const form = document.getElementById("compareForm");
    const submitBtn = document.getElementById("submitBtn");
    const statusArea = document.getElementById("statusArea");
    const resultArea = document.getElementById("resultArea");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(message, type = "loading") {
      statusArea.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function clearResult() {
      resultArea.innerHTML = "";
    }

    function renderResult(data) {
      const title = data.articleTitle
        ? escapeHtml(data.articleTitle)
        : "Không có tiêu đề";

      const changedCount =
        typeof data.changedCount === "number" ? data.changedCount : "-";

      const exactMatchText = data.exactMatchAfterNormalization
        ? "Có"
        : "Không";

      const highlightedHtml =
        data.highlightedFileHtml ||
        `<div class="preview-box">Không có dữ liệu hiển thị.</div>`;

      const debugHtml = data.debug
        ? `
          <details>
            <summary>Debug</summary>
            <pre>${escapeHtml(JSON.stringify(data.debug, null, 2))}</pre>
          </details>
        `
        : "";

      resultArea.innerHTML = `
        <div class="summary-grid">
          <div class="summary-box">
            <div class="summary-label">Tiêu đề bài viết</div>
            <div class="summary-value">${title}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Số từ khác biệt</div>
            <div class="summary-value">${changedCount}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Khớp hoàn toàn sau chuẩn hóa</div>
            <div class="summary-value">${exactMatchText}</div>
          </div>

          <div class="summary-box">
            <div class="summary-label">Trạng thái</div>
            <div class="summary-value">${data.success ? "Thành công" : "Thất bại"}</div>
          </div>
        </div>

        <div class="preview-box">
          ${highlightedHtml}
        </div>

        ${debugHtml}

        <div class="footer-note">
          Các từ được tô vàng là phần xuất hiện trong file HTML tải lên nhưng không khớp hoàn toàn với nội dung chính lấy từ URL.
        </div>
      `;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearResult();

      const url = document.getElementById("url").value.trim();
      const fileInput = document.getElementById("htmlFile");
      const file = fileInput.files[0];

      if (!url) {
        setStatus("Vui lòng nhập URL bài viết.", "error");
        return;
      }

      if (!file) {
        setStatus("Vui lòng chọn file HTML.", "error");
        return;
      }

      const fileName = file.name || "";
      if (!/\.(html?|xhtml)$/i.test(fileName)) {
        setStatus("File không hợp lệ. Chỉ chấp nhận .html hoặc .htm.", "error");
        return;
      }

      const formData = new FormData();
      formData.append("url", url);
      formData.append("htmlFile", file);

      submitBtn.disabled = true;
      setStatus("Đang tải file và phân tích nội dung, vui lòng chờ...", "loading");

      try {
        const response = await fetch("/compare-html", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          setStatus(
            escapeHtml(data.error || "Có lỗi xảy ra khi xử lý yêu cầu."),
            "error"
          );
          return;
        }

        setStatus("So sánh hoàn tất.", "success");
        renderResult(data);
      } catch (error) {
        setStatus(
          `Không thể kết nối tới server: ${escapeHtml(error.message || "Lỗi không xác định")}`,
          "error"
        );
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
